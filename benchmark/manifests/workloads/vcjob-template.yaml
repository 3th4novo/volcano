# VCJob Template for Volcano Benchmark
# This template creates a job with 50 pods using Gang Scheduling
# The job will be created multiple times (20 times) to reach 1000 pods total

apiVersion: batch.volcano.sh/v1alpha1
kind: Job
metadata:
  name: benchmark-job-INDEX
  namespace: benchmark
spec:
  # Gang Scheduling: all 50 pods must be scheduled together
  minAvailable: 50
  schedulerName: volcano
  queue: default
  # No retry to simplify benchmark
  maxRetry: 0
  tasks:
  - replicas: 50
    name: task
    template:
      metadata:
        labels:
          app: benchmark
          job: benchmark-job-INDEX
      spec:
        # Tolerate KWOK fake node taint
        tolerations:
        - key: "kwok.x-k8s.io/node"
          operator: "Equal"
          value: "fake"
          effect: "NoSchedule"
        containers:
        - name: benchmark-container
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["sleep", "infinity"]
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
        restartPolicy: Never
