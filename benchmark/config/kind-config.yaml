# Kind cluster configuration for Volcano benchmark
# This configuration creates a single control-plane node with optimized settings
# for high-throughput scheduling tests.

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: volcano-benchmark
nodes:
- role: control-plane
  kubeadmConfigPatches:
  - |
    kind: ClusterConfiguration
    apiServer:
      extraArgs:
        # Increase API server request limits for high-throughput testing
        max-mutating-requests-inflight: "3000"
        max-requests-inflight: "3000"
    controllerManager:
      extraArgs:
        # Increase controller manager API QPS
        kube-api-burst: "3000"
        kube-api-qps: "3000"
    scheduler:
      extraArgs:
        # Increase default scheduler API QPS (for comparison tests)
        kube-api-burst: "10000"
        kube-api-qps: "10000"
  extraPortMappings:
  # Prometheus NodePort
  - containerPort: 30090
    hostPort: 30090
    protocol: TCP
  # Grafana NodePort
  - containerPort: 30030
    hostPort: 30030
    protocol: TCP
  # Volcano Scheduler metrics port (for direct access)
  - containerPort: 30088
    hostPort: 30088
    protocol: TCP
