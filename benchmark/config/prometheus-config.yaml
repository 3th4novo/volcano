# Prometheus Configuration for Volcano Benchmark
# Scrape interval set to 1 second for fine-grained monitoring

global:
  scrape_interval: 1s
  evaluation_interval: 1s
  scrape_timeout: 1s

scrape_configs:
  # Scrape Volcano Scheduler metrics
  - job_name: 'volcano-scheduler'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: ['volcano-system']
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        regex: volcano-scheduler
        action: keep
      - source_labels: [__meta_kubernetes_pod_container_port_number]
        regex: "8080"
        action: keep
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
    metrics_path: /metrics

  # Scrape Kube-State-Metrics
  - job_name: 'kube-state-metrics'
    static_configs:
      - targets: ['kube-state-metrics.monitoring:8080']

  # Scrape Volcano Controller metrics
  - job_name: 'volcano-controller'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: ['volcano-system']
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        regex: volcano-controller-manager
        action: keep
      - source_labels: [__meta_kubernetes_pod_container_port_number]
        regex: "8080"
        action: keep
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
    metrics_path: /metrics
